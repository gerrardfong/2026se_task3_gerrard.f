{% extends 'layout.html' %}

{% block content %}
<div class="container my-5">
  <h1 type="text" class="display-4 fw-bold text-center">Gauntlet</h1>
</div>

  <div class="row g-4 justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="menu-card border border-2 rounded-4 p-4 h-100 bg-white text-center d-flex flex-column justify-content-between">
        <h2 class="h4 mb-3">Waves</h2>
        <p class="mb-4">Survive a set number of waves — every 5th wave brings a boss.</p>
        <a href="/gauntlet" class="btn btn-dark w-100">Play</a>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-5">
      <div class="menu-card border border-2 rounded-4 p-4 h-100 bg-white text-center d-flex flex-column justify-content-between">
        <h2 class="h4 mb-3">Endless</h2>
        <p class="mb-4">Face endless waves of enemies in a brutal test of survival.</p>
        <a href="/character-creation" class="btn btn-dark w-100">Play</a>
      </div>
    </div>
  </div>
</div>


{% endblock %}
